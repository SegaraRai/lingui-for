name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-wasm:
    name: Build Wasm Package and Test Rust Code
    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        run: rustup install stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/release/deps
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - run: cargo test

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install

      - run: vp run build:wasm

      - uses: actions/upload-artifact@v6
        with:
          name: wasm-package
          path: packages/astro-analyzer-wasm/dist/
          if-no-files-found: error
          retention-days: 1

  test:
    name: Test
    needs: build-wasm
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --user 1001

    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          name: wasm-package
          path: packages/astro-analyzer-wasm/dist

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install

      - run: vp run build:lib

      - run: vp run build:examples

      - run: vp run build:apps

      - run: vp run check

      - run: vp run test
