name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUILT_REPOSITORY_CACHE_PREFIX: ci-built-repository-${{ github.run_id }}-
  BUILT_REPOSITORY_CACHE_KEY: ci-built-repository-${{ github.run_id }}-${{ github.run_attempt }}
  WASM_PACKAGE_CACHE_PREFIX: ci-wasm-package-${{ github.run_id }}-
  WASM_PACKAGE_CACHE_KEY: ci-wasm-package-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  build-wasm:
    name: Build Wasm Package and Test Rust Code
    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        run: rustup install stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/release/deps
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - run: cargo test

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - run: vp install

      - run: vp run build:wasm

      - uses: actions/cache/save@v5
        with:
          path: shared/lingui-analyzer-wasm/dist/
          key: ${{ env.WASM_PACKAGE_CACHE_KEY }}

  build:
    name: Build
    needs: build-wasm
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user 1001

    timeout-minutes: 30

    env:
      LINGUI_WASM_PREBUILT: "1"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache/restore@v5
        with:
          path: shared/lingui-analyzer-wasm/dist
          key: ${{ env.WASM_PACKAGE_CACHE_KEY }}
          restore-keys: ${{ env.WASM_PACKAGE_CACHE_PREFIX }}
          fail-on-cache-miss: true

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - run: vp install

      - run: vp run build

      - name: Ensure build leaves working tree clean
        run: |
          git status --short
          test -z "$(git status --porcelain)"

      - uses: actions/cache/save@v5
        with:
          path: .
          key: ${{ env.BUILT_REPOSITORY_CACHE_KEY }}

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user 1001

    timeout-minutes: 30

    env:
      LINGUI_WASM_PREBUILT: "1"

    steps:
      - uses: actions/cache/restore@v5
        with:
          path: .
          key: ${{ env.BUILT_REPOSITORY_CACHE_KEY }}
          restore-keys: ${{ env.BUILT_REPOSITORY_CACHE_PREFIX }}
          fail-on-cache-miss: true

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - run: vp run check

      - run: vp run test

  compatibility:
    name: Compatibility (${{ matrix.case }})
    needs: build
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user 1001

    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        case:
          - lingui5-astro5-vite6
          - lingui5-astro6-vite7
          - lingui5-astro7-vite8
          - lingui5-svelte5-vite6
          - lingui5-svelte5-vite7
          - lingui5-svelte5-vite8
          - lingui5-vite6
          - lingui5-vite7
          - lingui5-vite8
          - lingui6-astro5-vite6
          - lingui6-astro6-vite7
          - lingui6-astro7-vite8
          - lingui6-svelte5-vite6
          - lingui6-svelte5-vite7
          - lingui6-svelte5-vite8
          - lingui6-vite6
          - lingui6-vite7
          - lingui6-vite8

    env:
      LINGUI_WASM_PREBUILT: "1"

    steps:
      - uses: actions/cache/restore@v5
        with:
          path: .
          key: ${{ env.BUILT_REPOSITORY_CACHE_KEY }}
          restore-keys: ${{ env.BUILT_REPOSITORY_CACHE_PREFIX }}
          fail-on-cache-miss: true

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - run: vp run test:compat --case ${{ matrix.case }}

  cleanup-transfer-caches:
    name: Cleanup Transfer Caches
    needs:
      - build-wasm
      - build
      - test
      - compatibility
    if: always()
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: read

    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const prefixes = [
              process.env.BUILT_REPOSITORY_CACHE_PREFIX,
              process.env.WASM_PACKAGE_CACHE_PREFIX,
            ].filter(Boolean);
            const response = await github.request(
              "GET /repos/{owner}/{repo}/actions/caches",
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              },
            );

            for (const cache of response.data.actions_caches) {
              if (!prefixes.some((prefix) => cache.key.startsWith(prefix))) {
                continue;
              }
              await github.request(
                "DELETE /repos/{owner}/{repo}/actions/caches/{cache_id}",
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id,
                },
              );
            }

  spelling:
    name: Spell Check with Typos
    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - name: Checkout Actions Repository
        uses: actions/checkout@v6

      - name: Spell Check Repo
        uses: crate-ci/typos@v1.44.0
