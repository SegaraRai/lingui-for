name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-wasm:
    name: Build Wasm Package and Test Rust Code
    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        run: rustup install stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/release/deps
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - run: cargo test

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install

      - run: vp run build:wasm

      - uses: actions/upload-artifact@v7
        with:
          name: wasm-package
          path: shared/lingui-analyzer-wasm/dist/
          if-no-files-found: error
          retention-days: 1

  test:
    name: Test
    needs: build-wasm
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user 1001

    timeout-minutes: 30

    env:
      LINGUI_WASM_PREBUILT: "1"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: wasm-package
          path: shared/lingui-analyzer-wasm/dist

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install

      - run: vp run build

      - name: Ensure build leaves working tree clean
        run: |
          git status --short
          test -z "$(git status --porcelain)"

      - run: vp run check

      - run: vp run test

  compatibility:
    name: Compatibility (${{ matrix.case }})
    needs: build-wasm
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user 1001

    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        case:
          - lingui5-astro6
          - lingui5-astro5
          - lingui5-svelte-vite7
          - lingui5-svelte-vite8
          - lingui5-vite8
          - lingui6-astro6
          - lingui6-astro5
          - lingui6-svelte-vite7
          - lingui6-svelte-vite8
          - lingui6-vite8

    env:
      LINGUI_WASM_PREBUILT: "1"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: wasm-package
          path: shared/lingui-analyzer-wasm/dist

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install

      - run: vp run test:compat -- --case ${{ matrix.case }}

  spelling:
    name: Spell Check with Typos
    runs-on: ubuntu-latest

    timeout-minutes: 30

    steps:
      - name: Checkout Actions Repository
        uses: actions/checkout@v6

      - name: Spell Check Repo
        uses: crate-ci/typos@v1.44.0
