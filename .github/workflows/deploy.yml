name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-wasm:
    name: Build Wasm Package
    runs-on: ubuntu-latest

    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Rust
        run: rustup install stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/release/deps
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install

      - run: vp run build:wasm

      - uses: actions/upload-artifact@v7
        with:
          name: wasm-package
          path: shared/lingui-analyzer-wasm/dist/
          if-no-files-found: error
          retention-days: 1

  build-docs:
    name: Build Docs
    needs: build-wasm
    runs-on: ubuntu-latest

    timeout-minutes: 30

    permissions:
      contents: read

    env:
      LINGUI_WASM_PREBUILT: "1"

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v8
        with:
          name: wasm-package
          path: shared/lingui-analyzer-wasm/dist

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install

      - run: vp run build:lib

      - run: vp run build:docs

      - uses: actions/upload-pages-artifact@v4
        with:
          path: apps/docs/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest

    timeout-minutes: 10

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
