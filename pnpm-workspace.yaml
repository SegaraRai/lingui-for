packages:
  - apps/*
  - examples/*
  - packages/*
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.1.13
  vitest: npm:@voidzero-dev/vite-plus-test@latest

onlyBuiltDependencies:
  - esbuild
  - wasm-pack
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
