    "@lingui/cli": ^6.0.1
    "@lingui/conf": ^6.0.1
    "@lingui/core": ^6.0.1
    "@lingui/format-po": ^6.0.1
    "@lingui/react": ^6.0.1
    "@sveltejs/adapter-node": ^5.5.4
    "@sveltejs/kit": ^2.60.1
